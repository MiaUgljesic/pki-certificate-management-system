<app-page-header
    title="My Certificates" description="View your end-entity certificates"
    [showDateFilter]="true" (filter)="onFilter($event)" (clearFilter)="onClearFilter()">
</app-page-header>
<app-user-overview-table  [certificates]="filteredCertificates" (sortChange)="onSort($event)" (downloadRequested)="onDownloadRequested($event)" ></app-user-overview-table>

@if (selectedDownloadCertificate) {
  <app-download-certificate-modal
    [certificate]="selectedDownloadCertificate"
    (close)="cancelDownload()"
    (submitWithoutKey)="submitDownloadWithoutKey($event)">
  </app-download-certificate-modal>
}

<div class="d-flex justify-content-center align-items-center gap-3 mb-3">
  <app-button text="←" variant="primary" height="30px" width="40px" [disabled]="isFirstPage" (clicked)="goToPreviousPage()"></app-button>
  <span class="text-muted"> page {{ currentPage + 1 }} of {{ totalPages }} ({{ totalElements }} total certificates)</span>
  <app-button text="→" variant="primary"  height="30px" width="40px" [disabled]="isLastPage" (clicked)="goToNextPage()"></app-button>
</div>
