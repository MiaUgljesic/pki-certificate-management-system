<div class="activate-container">
  <div class="activate-card">
    <h1>Activate Your Account</h1>

    <div *ngIf="errorMessage()" class="error-message">
      {{ errorMessage() }}
    </div>

    <div *ngIf="successMessage()" class="success-message">
      {{ successMessage() }}
    </div>

    <form (ngSubmit)="activate()" class="activate-form">
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <app-input-component
            [type]="showPassword() ? 'text' : 'password'"
            id="password"
            placeholder="Enter your password"
            [value]="password()"
            (valueChange)="onPasswordChange($event)"
          ></app-input-component>
          <button
            type="button"
            class="password-toggle-btn"
            (click)="togglePasswordVisibility()"
            title="Toggle password visibility"
            aria-label="Toggle password visibility"
          >
            <svg *ngIf="showPassword()" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="!showPassword()" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <div *ngIf="fieldErrors()['password']" class="password-error">
          <div *ngFor="let error of getPasswordErrorMessages()" class="field-error">
            {{ error }}
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-input-wrapper">
          <app-input-component
            [type]="showConfirmPassword() ? 'text' : 'password'"
            id="confirmPassword"
            placeholder="Confirm your password"
            [value]="confirmPassword()"
            (valueChange)="onConfirmPasswordChange($event)"
          ></app-input-component>
          <button
            type="button"
            class="password-toggle-btn"
            (click)="toggleConfirmPasswordVisibility()"
            title="Toggle password visibility"
            aria-label="Toggle password visibility"
          >
            <svg *ngIf="showConfirmPassword()" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="!showConfirmPassword()" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <span *ngIf="fieldErrors()['confirmPassword']" class="field-error">
          {{ fieldErrors()['confirmPassword'] }}
        </span>
      </div>

      <app-button
        [text]="loading() ? 'Activating...' : 'Activate Account'"
        width="100%"
        height="42px"
        fontWeight="700"
        [disabled]="loading()"
        (clicked)="activate()"
      ></app-button>
    </form>
  </div>
</div>
