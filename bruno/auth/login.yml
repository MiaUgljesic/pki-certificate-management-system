info:
  name: login
  type: http

http:
  method: POST
  url: http://localhost:8080/api/auth/login
  body:
    type: json
    data: |-
      {
        "email": "admin@example.com",
        "password": "123123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
