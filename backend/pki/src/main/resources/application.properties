spring.application.name=pki
# Server
server.port=8443

spring.config.import=optional:file:.env[.properties]

server.ssl.key-store=${CERT_PATH}
server.ssl.key-store-password=${KEY_PASSWORD}
server.ssl.key-alias=${KEY_ALIAS}
server.ssl.key-store-type=PKCS12

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# MASTER KEY
app.security.master-key-secret=${MASTER_KEY}
app.security.master-key-rotation-batch-size=${MASTER_KEY_ROTATION_BATCH_SIZE}
app.security.master-key-rotation-days=${MASTER_KEY_ROTATION_DAYS}
app.security.master-key-rotation-batch-delay-ms=${MASTER_KEY_ROTATION_BATCH_DELAY_MS}
app.security.master-key-rotation-check-delay-ms=${MASTER_KEY_ROTATION_CHECK_DELAY_MS}

# KEY STORE
app.keystore.path=${KEYSTORE_PATH:default_certs.jks}
app.keystore.password=${KEYSTORE_PASSWORD:default_password}

# MAIL SERVER
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# CORS
spring.web.resources.add-mappings=false