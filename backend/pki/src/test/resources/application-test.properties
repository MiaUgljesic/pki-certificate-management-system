# In-memory DB for integration tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recreate schema for each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT values used by JwtService in tests
jwt.secret=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# Master key secret for test encryption
app.security.master-key-secret=TestMasterKeySecret123!
app.security.master-key-rotation-batch-size=100
app.security.master-key-rotation-days=365
app.security.master-key-rotation-batch-delay-ms=10000
app.security.master-key-rotation-check-delay-ms=3600000

# Keystore settings for certificate tests
app.keystore.path=target/test-keystore.jks
app.keystore.password=test-password
